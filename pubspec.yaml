name: viikshana
description: A Flutter project
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.2.1
  riverpod: ^3.2.1
  go_router: ^17.1.0

  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0

  hive: ^2.2.3
  hive_flutter: ^1.1.0

  video_player: ^2.9.1
  chewie: ^1.8.5

  device_info_plus: ^12.3.0

  http: ^1.2.0

flutter:
  uses-material-design: true

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/viikshana_logo.png
  adaptive_icon_background: "#0D0D0D"
  adaptive_icon_foreground: assets/branding/viikshana_logo.png
  remove_alpha_ios: true